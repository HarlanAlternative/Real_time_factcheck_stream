apiVersion: 1

groups:
  - orgId: 1
    name: factcheck-alerts
    folder: FactCheck
    interval: 1m
    rules:
      - uid: factcheck-drift
        title: Falsehood Drift High
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: 100 * sum(increase(factcheck_label_distribution_total{label=~"false|pants-fire"}[5m])) / clamp_min(sum(increase(factcheck_label_distribution_total[5m])), 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 60
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: False and pants-fire outputs exceed 60% of the last 5 minutes.
        labels:
          severity: warning

